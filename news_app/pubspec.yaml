name: news_app
description: 'A new Flutter project.'
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # state management
  flutter_bloc: ^8.1.2

  # comparing dart obj
  equatable: ^2.0.8

  # service locator
  get_it: ^7.7.0

  # date format
  intl: ^0.20.2

  # database
  floor: ^1.4.2

  # make request to api
  retrofit: ^3.0.1+1

  # hooks
  flutter_hooks: ^0.18.6

  cached_network_image: ^3.4.1

  dio: ^4.0.1
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^6.0.0
  retrofit_generator: 4.2.0
  floor_generator: ^1.4.2
  build_runner: ^2.1.11

flutter:
  uses-material-design: true
  assets:
    - .env

